name: Build Android APK

# 三种触发：
# - pull_request：PR 到 main 时跑，产出 APK artifact（私有自测 + 代码审查用）。不发版。
# - workflow_dispatch：手动跑，同上（需 workflow 先上过默认分支才被 GitHub 注册）。
# - push tag v*：公开发版，发 GitHub Release。
# 本机无安卓工具链，CI 装 JDK21 + Android SDK。
# JDK 必须 21：android/app/capacitor.build.gradle 声明 sourceCompatibility/targetCompatibility
# VERSION_21（Capacitor 8 要求），JDK 17 编译必挂。
# 注：workflow_dispatch 需 workflow 文件先上过默认分支才被 GitHub 注册；pull_request
# 无此限，PR 头 ref 直接跑。故私有自测走 pull_request 通道。
on:
  pull_request:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # softprops/action-gh-release 上传资产需要

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Capacitor 8 CLI 要求 Node >=22（cap sync 在 Node 20 直接 fatal）。
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install deps
        run: npm ci

      - name: Build web
        # VITE_FEEDBACK_* 在构建时 inline 进包（githubFeedback.ts 读 import.meta.env）。
        # .env.local 是 gitignored，CI 上不存在 → 须从 secret 注入 env，否则 APK 里
        # token/repo 为空，反馈点击报「未配置」。BYOK key（VITE_LLM_KEY 等）故意不注入：
        # 那是付费 key，烘进公开 APK 会泄露。
        env:
          VITE_FEEDBACK_GITHUB_TOKEN: ${{ secrets.FEEDBACK_GITHUB_TOKEN }}
          VITE_FEEDBACK_GITHUB_REPO: ${{ secrets.FEEDBACK_GITHUB_REPO }}
        run: npm run build

      - name: Sync version into gradle
        # 版本单一真源 = package.json version。读出写进 versionName，保证
        # 原生「系统设置里的版本」== __APP_VERSION__（vite define 烘焙自同一 package.json）。
        # tag 触发时额外断言 tag==package.json，防漂移（tag v0.2.0 但忘 bump package.json
        # → in-app 自报 0.1.0 vs APK 0.2.0，更新检测会误判自己过期）。
        # versionCode 用 run_number 单调递增（debug 签名下足够区分版本）。
        run: |
          VER=$(node -p "require('./package.json').version")
          echo "package.json version=$VER"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG=${GITHUB_REF_NAME#v}
            if [[ "$TAG" != "$VER" ]]; then
              echo "::error::tag v$TAG != package.json $VER —— 先 bump package.json 再打 tag"
              exit 1
            fi
          fi
          sed -i -E "s/^(\s*)versionCode .*/\1versionCode ${{ github.run_number }}/" android/app/build.gradle
          sed -i -E "s/^(\s*)versionName \".*\"/\1versionName \"$VER\"/" android/app/build.gradle
          grep -nE "versionCode|versionName" android/app/build.gradle

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode release keystore
        # D23: release 签名 keystore 存 GitHub secret（base64），CI 解码到 android/app/。
        # 仅 tag 发版用 release 签名；PR build 无 secret → AIO_BUILD_KEYSTORE 为空 →
        # gradle 回落 debug 签名（固定 debug.keystore，PR 产物可内部覆盖）。
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
            echo "release keystore decoded ($(wc -c < android/app/release.keystore) bytes)"
          else
            echo "::warning::ANDROID_KEYSTORE_BASE64 secret missing, falling back to debug signing"
          fi

      - name: Build APK
        working-directory: android
        env:
          # gradle 的 file() 相对模块目录(android/app)解析，传相对路径 'app/release.keystore'
          # 会变成 android/app/app/release.keystore（双重 app）。用 github.workspace 绝对路径
          # 避免模块目录歧义。
          AIO_KEYSTORE_PATH: ${{ secrets.ANDROID_KEYSTORE_BASE64 && format('{0}/android/app/release.keystore', github.workspace) || '' }}
          AIO_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          AIO_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          AIO_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -f app/release.keystore ]; then
            echo "Building release APK with release signing"
            ./gradlew assembleRelease
          else
            echo "Building debug APK (no release keystore)"
            ./gradlew assembleDebug
          fi

      - name: Rename APK
        # 固定资产名 aiji.apk → 稳定直链 releases/latest/download/aiji.apk（tag 发版时）。
        run: |
          mkdir -p release
          if [ -f android/app/build/outputs/apk/release/app-release.apk ]; then
            cp android/app/build/outputs/apk/release/app-release.apk release/aiji.apk
          else
            cp android/app/build/outputs/apk/debug/app-debug.apk release/aiji.apk
          fi
          ls -la release/

      - name: Upload APK artifact
        # 非发版触发（pull_request / workflow_dispatch）都上传 artifact 供私有自测下载。
        # tag 发版时跳过（Release 已附 APK 资产，artifact 冗余）。
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: aiji-apk
          path: release/aiji.apk
          retention-days: 14

      - name: Release
        # tag 触发：发公开 GitHub Release。
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/aiji.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
