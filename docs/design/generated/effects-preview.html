<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="refresh" content="30">
<title>AiJi 效果宣传图预览</title>
<style>
  :root{
    --page:#f7f7fa; --card:#fff; --ink:#14141a; --t2:#6b6b75; --t3:#9a9aa5;
    --pri:#4f46e5; --priS:#eeedfd; --brd:#ececef;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--page);color:var(--ink);
    font-family:"Noto Sans SC",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    -webkit-font-smoothing:antialiased}
  header{max-width:1100px;margin:0 auto;padding:28px 20px 6px}
  header h1{font-size:24px;font-weight:700;margin:0 0 6px;display:flex;align-items:center;gap:10px}
  header h1::before{content:"";display:block;width:4px;height:22px;background:var(--pri);border-radius:2px}
  header p{color:var(--t2);font-size:13px;margin:0 0 4px;line-height:1.6}
  header .meta{color:var(--t3);font-size:11px;margin-top:8px}
  .page{max-width:1100px;margin:0 auto;padding:20px 20px 0}
  .page>h2{font-size:17px;font-weight:700;margin:0 0 14px}
  .pair{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:28px}
  .cell{background:var(--card);border:1px solid var(--brd);border-radius:16px;overflow:hidden}
  .cell .tag{display:inline-block;font-size:10px;font-weight:500;padding:2px 8px;
    background:var(--priS);color:var(--pri);border-radius:999px;margin:12px 14px 0}
  .cell .lbl{font-size:12px;color:var(--t2);margin:0 14px 4px;font-weight:500}
  .cell .imgwrap{background:repeating-conic-gradient(#f1f1f3 0% 25%,#fbfbfd 0% 50%) 50%/18px 18px;
    min-height:200px;display:flex;align-items:center;justify-content:center;padding:12px}
  .cell img{max-width:100%;max-height:520px;object-fit:contain;display:block;border-radius:8px}
  .cell .pending{color:var(--t3);font-size:12px;padding:40px 0}
  .imgwrap:has(.pending){background:var(--card)}
  footer{max-width:1100px;margin:0 auto;padding:20px 20px 56px;color:var(--t3);font-size:11px;line-height:1.7;border-top:1px solid var(--brd);margin-top:24px}
</style>
</head>
<body>
<header>
  <h1>AiJi 效果宣传图</h1>
  <p>8 个运行页 ×（功能介绍图 FI + 界面优化美化图 UP）= 16 张。图生图，以 390×844 页面截图为参考底图。</p>
  <p class="meta">本页每 30 秒自动刷新，新生成的图会陆续出现 · 文档见同目录 EFFECTS_ASSETS.md（批量跑完后写）</p>
</header>

<div class="page" id="grid"></div>

<footer>
  🎨 由 美境AI设计师（gpt-image-2）图生图生成 · sessionId 1026591 · 临时预览页，起自 docs/design/generated/ 静态服务器。
</footer>

<script>
const PAGES = [
  ["onboarding","onboarding 首屏","中央「记」字标 + tagline + 三段图示 + 「开始使用」CTA"],
  ["home","home 首页","屏标题「记」+ 时间线条目卡 + 采集 FAB + 五 tab"],
  ["capture","capture 采集","录音波形 + 文本区 + 保存按钮 + ‹ 返回"],
  ["detail","detail 详情","原文「地铁里想到如果记一条东西能顺便变提醒就好了」+ AI 面板 + 类别/标签 + 编辑/重处理/删除"],
  ["categories","categories 分类","类别卡（强调色边条 + 计数 + 预览）+ NavBottom+FAB"],
  ["summary","summary 汇总","时间维度选择器 + 计数 + 趋势区"],
  ["search","search 搜索","搜索框 + 快捷 chip + 结果/空态"],
  ["settings","settings 设置","分组列表（外观/记录位置/密钥/提醒/关于）"],
];
const grid = document.getElementById("grid");
PAGES.forEach(([key,name,desc])=>{
  const sec = document.createElement("div");
  sec.className = "pair";
  sec.innerHTML = `
    <div class="cell">
      <span class="tag">FI · 9:16 · 功能介绍</span>
      <p class="lbl">${name} — 功能介绍图</p>
      <div class="imgwrap"><img src="effects/${key}-intro.png" alt="${key}-intro"
        onerror="this.parentNode.innerHTML='<div class=pending>生成中…</div>'"></div>
    </div>
    <div class="cell">
      <span class="tag">UP · 828×1792 · UI 优化</span>
      <p class="lbl">${name} — 界面优化美化图</p>
      <div class="imgwrap"><img src="effects/${key}-uipolish.png" alt="${key}-uipolish"
        onerror="this.parentNode.innerHTML='<div class=pending>生成中…</div>'"></div>
    </div>`;
  grid.appendChild(sec);
});
</script>
</body>
</html>
